kind = "web"
previewPath = "/"
title = "Wiya"
version = "1.0.0"
id = "artifacts/wiya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24089

[services.development]
run = "pnpm --filter @workspace/wiya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wiya", "run", "build" ]
publicDir = "artifacts/wiya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24089"
BASE_PATH = "/"
